{% extends 'layout.html' %}
{% block title %}Login | FaturaPro{% endblock %}
{% block guest_content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo" class="mb-3" style="height: 50px;">
          <h4>Entrar no Sistema</h4>
          <p class="text-muted">Digite suas credenciais para acessar o painel.</p>
        </div>
        <form method="post" novalidate>
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button class="btn btn-primary w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
