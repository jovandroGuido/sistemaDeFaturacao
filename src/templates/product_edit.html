{% extends 'layout.html' %}
{% block title %}Editar Produto | FaturaPro{% endblock %}
{% block page_title %}Editar Produto{% endblock %}
{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <form method="post" class="row g-3">
      <div class="col-md-4"><label class="form-label">Código</label><input class="form-control" name="code" value="{{ product.code }}" required></div>
      <div class="col-md-4"><label class="form-label">Nome</label><input class="form-control" name="name" value="{{ product.name }}" required></div>
      <div class="col-md-4"><label class="form-label">Categoria</label><select class="form-select" name="category_id"><option value="">Sem categoria</option>{% for category in categories %}<option value="{{ category.id }}" {% if product.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>{% endfor %}</select></div>
      <div class="col-md-3"><label class="form-label">Preço</label><input class="form-control" name="price" type="number" step="0.01" value="{{ '%.2f'|format(product.price) }}" required></div>
      <div class="col-md-3"><label class="form-label">Stock</label><input class="form-control" name="stock" type="number" value="{{ product.stock }}" required></div>
      <div class="col-12 d-flex gap-2"><button class="btn btn-success">Salvar alterações</button><a class="btn btn-secondary" href="{{ url_for('products') }}">Cancelar</a></div>
    </form>
  </div>
</div>
{% endblock %}
